spring.application.name=movies
spring.datasource.url=jdbc:mysql://localhost:3306/moviedb?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

app.language.default=es
app.pageSize.default=10
app.base.url=http://localhost:8080

spring.jpa.hibernate.ddl-auto=none
# Habilitar logs de consultas SQL
spring.jpa.show-sql=true

#Para que jpa no busque director_id en lugar de directorId (por defecto lo hace y evidentemente no lo encuentra)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

